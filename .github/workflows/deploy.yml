name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Prepare standalone bundle
        run: bash scripts/prepare-standalone.sh

      - name: Configure SSH
        env:
          DROPLET_SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
          DROPLET_SSH_HOST_KEY: ${{ secrets.DROPLET_SSH_HOST_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          if [ -z "${DROPLET_SSH_KEY//[[:space:]]/}" ]; then
            echo "::error::DROPLET_SSH_KEY secret is missing"
            exit 1
          fi

          printf '%s\n' "$DROPLET_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          if [ -z "${DROPLET_SSH_HOST_KEY//[[:space:]]/}" ]; then
            echo "::error::DROPLET_SSH_HOST_KEY secret is missing."
            echo "From your laptop, run:"
            echo "  ssh-keyscan -t ed25519,ecdsa,rsa -H YOUR_DROPLET_IP"
            echo "Paste the full output into GitHub → Settings → Secrets → DROPLET_SSH_HOST_KEY"
            exit 1
          fi

          printf '%s\n' "$DROPLET_SSH_HOST_KEY" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          if ! grep -qE 'ssh-(ed25519|rsa|ecdsa)' ~/.ssh/known_hosts; then
            echo "::error::DROPLET_SSH_HOST_KEY does not contain a valid ssh host key line"
            exit 1
          fi

      - name: Test SSH connection
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
        run: |
          SSH_OPTS="-i ~/.ssh/deploy_key -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts"
          ssh $SSH_OPTS "${DROPLET_USER}@${DROPLET_HOST}" "echo SSH connection OK"

      - name: Deploy standalone bundle
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
        run: |
          RSYNC_SSH="ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts"
          rsync -avz --delete \
            -e "$RSYNC_SSH" \
            .next/standalone/ \
            "${DROPLET_USER}@${DROPLET_HOST}:/opt/bglib/.next/standalone/"

      - name: Deploy start script
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
        run: |
          RSYNC_SSH="ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts"
          rsync -avz \
            -e "$RSYNC_SSH" \
            scripts/start-production.sh \
            "${DROPLET_USER}@${DROPLET_HOST}:/opt/bglib/scripts/start-production.sh"

      - name: Restart app
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
        run: |
          SSH_OPTS="-i ~/.ssh/deploy_key -o BatchMode=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts"
          ssh $SSH_OPTS "${DROPLET_USER}@${DROPLET_HOST}" "sudo systemctl restart bglib"
