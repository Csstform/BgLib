name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Prepare standalone bundle
        run: bash scripts/prepare-standalone.sh

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DROPLET_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DROPLET_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy standalone bundle
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
        run: |
          RSYNC_SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes"
          rsync -avz --delete \
            -e "$RSYNC_SSH" \
            .next/standalone/ \
            "${DROPLET_USER}@${DROPLET_HOST}:/opt/bglib/.next/standalone/"

      - name: Deploy start script
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
        run: |
          RSYNC_SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes"
          rsync -avz \
            -e "$RSYNC_SSH" \
            scripts/start-production.sh \
            "${DROPLET_USER}@${DROPLET_HOST}:/opt/bglib/scripts/start-production.sh"

      - name: Restart app
        env:
          DROPLET_HOST: ${{ secrets.DROPLET_HOST }}
          DROPLET_USER: ${{ secrets.DROPLET_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            "${DROPLET_USER}@${DROPLET_HOST}" \
            "sudo systemctl restart bglib"
