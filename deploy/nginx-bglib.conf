# Nginx site for BgLib behind Cloudflare.
# Install: sudo cp deploy/nginx-bglib.conf /etc/nginx/sites-available/bglib
#          sudo ln -s /etc/nginx/sites-available/bglib /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
#
# Replace bglib.csst.rocks with your subdomain.
# SSL paths below use a Cloudflare Origin Certificate (recommended).

upstream bglib_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

# Redirect HTTP → HTTPS (Cloudflare may also do this at the edge)
server {
    listen 80;
    listen [::]:80;
    server_name bglib.csst.rocks;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bglib.csst.rocks;

    # Cloudflare Origin Certificate (Dashboard → SSL/TLS → Origin Server)
    ssl_certificate     /etc/ssl/cloudflare/bglib.csst.rocks.pem;
    ssl_certificate_key /etc/ssl/cloudflare/bglib.csst.rocks.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Real client IP when proxied through Cloudflare
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    client_max_body_size 10M;

    location / {
        proxy_pass http://bglib_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
